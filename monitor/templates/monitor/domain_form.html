{% extends 'monitor/base.html' %}

{% block title %}{{ title }}{% endblock %}

{% block content %}
<div class="card p-4" style="max-width: 600px; margin: 0 auto;">
    <h3 class="mb-4">{{ title }}</h3>
    
    <form method="post">
        {% csrf_token %}
        
        <div class="mb-3">
            <label for="{{ form.name.id_for_label }}" class="form-label">Доменное имя *</label>
            {{ form.name }}
            {% if form.name.errors %}
                <div class="text-danger small mt-1">{{ form.name.errors.0 }}</div>
            {% endif %}
        </div>

        <div class="mb-3">
            <label for="{{ form.owner.id_for_label }}" class="form-label">Ответственный *</label>
            {{ form.owner }}
        </div>

        <div class="row">
            <div class="col-md-6 mb-3">
                <label for="{{ form.criticality.id_for_label }}" class="form-label">Критичность</label>
                {{ form.criticality }}
            </div>
            <div class="col-md-6 mb-3 d-flex align-items-end">
                <div class="form-check">
                    {{ form.is_active }}
                    <label class="form-check-label" for="{{ form.is_active.id_for_label }}">
                        Мониторинг включён
                    </label>
                </div>
            </div>
        </div>

        <div class="d-flex gap-2 mt-4">
            <button type="submit" class="btn btn-primary">💾 Сохранить</button>
            <a href="{% url 'monitor:dashboard' %}" class="btn btn-outline-secondary">Отмена</a>
        </div>
    </form>
</div>
{% endblock %}
